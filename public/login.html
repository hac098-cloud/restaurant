<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - 餐厅系统</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f6f3ee;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .login-card {
      background: white;
      width: 360px;
      padding: 28px;
      border-radius: 20px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.1);
    }

    h1 {
      margin-top: 0;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 12px;
      background: #ffb703;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    p {
      text-align: center;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <form class="login-card" method="POST" action="/login">
    <h1>餐厅系统登录</h1>

    <input name="username" placeholder="账号" required />
    <input name="password" type="password" placeholder="密码" required />

    <button type="submit">登录</button>

    <p>默认账号：admin<br>默认密码：123456</p>
  </form>
</body>
</html>
